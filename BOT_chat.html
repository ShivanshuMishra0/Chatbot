<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAI - New Chat</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #a855f7;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            height: 100vh;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .message {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        .message.user { justify-content: flex-end; }

        .bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .user .bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .bubble {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .input-wrapper {
            padding: 20px;
            background: linear-gradient(transparent, var(--bg-dark) 20%);
        }

        .input-box {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            display: flex;
            padding: 10px 15px;
            align-items: center;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            font-size: 1rem;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header style="padding: 20px; text-align: center; border-bottom: 1px solid var(--glass);">
            <h3 id="chatTitle">New Chat</h3>
        </header>

        <div class="messages-list" id="chatWindow">
            <div class="message ai">
                <div class="bubble">Hello! I'm your AI assistant. How can I help you today?</div>
            </div>
        </div>

        <div class="input-wrapper">
            <form id="chatForm" class="input-box">
                <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off">
                <button type="submit" class="send-btn">↑</button>
            </form>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatWindow = document.getElementById('chatWindow');

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Show User Message
            addMessage(text, 'user');
            userInput.value = '';

            // 2. Show "Thinking" placeholder
            const aiMsgDiv = addMessage('...', 'ai');

            // 3. Connect to your Flask Backend
            try {
                const response = await fetch('http://127.0.0.1:5000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                aiMsgDiv.querySelector('.bubble').textContent = data.reply;
            } catch (err) {
                aiMsgDiv.querySelector('.bubble').textContent = "Sorry, I'm having trouble connecting to the server.";
            }
        };

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
