<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAI - Neural Dashboard</title> 
    <style>
        /* --- ENHANCED CSS VARIABLES --- */
        :root {
            --bg-dark: #020617;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        .light-theme {
            --bg-dark: #f8fafc;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.1);
            --glass-bg: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-primary: #0f172a;
            --text-secondary: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary); 
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- BACKGROUND DECOR --- */
        .bg-orb {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            border-radius: 50%; z-index: -1; filter: blur(50px);
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px; background: var(--glass-bg);
            backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; padding: 20px;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 12px; cursor: pointer;
            margin-bottom: 8px; transition: 0.3s; color: var(--text-secondary);
        }
        .nav-item:hover { 
            background: var(--glass-border); 
            color: var(--text-primary);
            transform: translateX(5px);
        }
        .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--accent); border: 1px solid var(--accent-glow); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; padding: 20px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; flex-shrink: 0; }

        /* GREETING SECTION (Initial State) */
        .greeting-section {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .greeting-section.hidden {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
            display: none !important; /* JS will handle the display toggle */
        }

        .greeting-section h1 { font-size: 3rem; font-weight: 700; margin-bottom: 10px; letter-spacing: -1px; }

        /* --- CHAT DISPLAY (Active State) --- */
        .chat-display {
            flex: 1;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            overflow-y: auto;
            padding: 20px;
            display: none; /* Hidden at start */
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 0.95rem; }
        .user-message { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .bot-message { align-self: flex-start; background: var(--glass-bg); border: 1px solid var(--glass-border); border-bottom-left-radius: 2px; }

        /* --- INPUT AREA --- */
        .input-wrapper { width: 100%; max-width: 800px; margin: 0 auto 20px auto; flex-shrink: 0; }
        .input-box {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 8px; display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }
        .input-box input { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); font-size: 1rem; padding: 10px 15px; }
        .send-btn {
            background: var(--accent); color: white; border: none; width: 40px; height: 40px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .send-btn:hover { transform: scale(1.05); }

        /* --- USER FOOTER --- */
        .user-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #a855f7); display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border: 2px solid var(--bg-dark); border-radius: 50%; position: absolute; bottom: -2px; right: -2px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <div class="bg-orb"></div>

    <aside class="sidebar">
        <div style="font-size: 1.5rem; font-weight: 800; padding: 10px 16px; margin-bottom: 30px;">
            My<span style="color: var(--accent);">AI</span>
        </div>

        

        <div class="nav-item active" id="newChatBtn">
            <span>✨</span> New Thread
        </div>
        <div class="nav-item" id="generateInsightsBtn">
            <span>📊</span> Analytics
        </div>

        <div class="nav-item" id="clearOngoingBtn" style="cursor: pointer; color: #fb7185;">
    <span>🧹</span> Clear Screen 
</div>

<div class="nav-item" id="clearHistoryBtn" style="cursor: pointer; color: #fb7185; font-weight: bold;">
    <span>🗑️</span> Purge All History (Database)
</div>

        <div style="margin-top: 30px; font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); padding: 0 16px; letter-spacing: 1px;">
            History
        </div>
        <div class="chat-history-container" style="padding: 10px 16px; font-size: 0.85rem; color: var(--text-secondary); font-style: italic;">
            No recent chats.
        </div>

        <div class="user-footer">
            <div class="user-info" id="settingsBtn">
                <div class="avatar" id="avatarIcon">S
                    <div class="status-dot"></div>
                </div>
                <div>
                    <div id="usernameDisplay" style="font-weight: 600; font-size: 0.9rem;">Sachin</div>
                    <div style="font-size: 0.7rem; color: var(--text-secondary);">Pro Plan</div>
                </div>
            </div>
            <div id="logoutBtn" style="cursor: pointer; font-size: 1.2rem; opacity: 0.6;">🚪</div>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div style="font-size: 0.85rem; opacity: 0.5; letter-spacing: 1px;">MyAI Guru</div>
            <button id="themeToggle" style="background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 10px; cursor: pointer; color: var(--text-primary);">Theme</button>
        </div>

        <div class="greeting-section" id="greetingArea">
            <h1 id="dynamicGreeting">Initialize Command</h1>
            <p style="color: var(--text-secondary);">What shall we create today?</p>
        </div>

        <div id="chatDisplay" class="chat-display"></div>

        <div class="input-wrapper">
            <form id="chatForm" class="input-box">
                <input type="text" id="chatInput" placeholder="Send a message to MyAI..." autocomplete="off" />
                <button type="submit" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                </button>
            </form>
            <div style="text-align: center; margin-top: 15px; font-size: 0.75rem; color: var(--text-secondary); opacity: 0.5;">
                Jarvis Neural Network v4.0.1
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
       // BOT_dashboard.html ke niche sirf itna rakhein
document.addEventListener("DOMContentLoaded", () => {
    const username = localStorage.getItem("username") || "User";
    const display = document.getElementById("usernameDisplay");
    const avatar = document.getElementById("avatarIcon");
    const greeting = document.getElementById("dynamicGreeting");

    if(username && username !== "undefined") {
        display.textContent = username;
        avatar.textContent = username.charAt(0).toUpperCase();
        greeting.textContent = `Welcome, ${username}`;
    }

    // YAHAN SE THEME WALA PURANA CODE DELETE KAR DIYA HAI
    // Kyunki ab app.js sab sambhaal raha hai

    // Navigation
    document.getElementById("settingsBtn").onclick = () => window.location.href = "BOT_settings.html";
    document.getElementById("logoutBtn").onclick = () => { localStorage.clear(); window.location.href = "BOT.html"; };
});
    </script>
</body>
</html>
