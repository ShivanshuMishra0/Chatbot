<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyAI - Account Settings</title> 
<style>
  :root {
    --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-primary: #ffffff;
    --text-muted: #94a3b8;
    --accent: #a855f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg-gradient);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .settings-card {
    width: 100%;
    max-width: 600px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.5s ease-out;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--glass-border);
    padding-bottom: 15px;
  }

  .back-link {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.2s;
  }

  .back-link:hover { color: #fff; }

  section { margin-bottom: 35px; }
  h3 { font-size: 1.1rem; margin-bottom: 20px; color: var(--accent); letter-spacing: 0.5px; }

  .info-group {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .label { color: var(--text-muted); font-size: 0.9rem; }
  .value { font-weight: 500; }

  .form-group { margin-bottom: 15px; }
  label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
  
  input {
    width: 100%;
    padding: 12px 15px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: white;
    outline: none;
    transition: border-color 0.3s;
  }

  input:focus { border-color: var(--accent); }

  .save-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
  }

  .save-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4);
  }

  .save-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

  <div class="settings-card">
    <div class="header">
      <h2>⚙️ Settings</h2>
      <a href="BOT_dashboard.html" class="back-link">✕ Close</a>
    </div>

    <section>
      <h3>User Information</h3>
      <div class="info-group">
        <span class="label">Full Name</span>
        <span class="value" id="displayFullname">Loading...</span>
      </div>
      <div class="info-group">
        <span class="label">Email Address</span>
        <span class="value" id="displayEmail">Loading...</span>
      </div>
    </section>

    <section>
      <h3>Security</h3>
      <form id="changePasswordForm">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="currPass" required>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPass" required minlength="6">
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="confPass" required minlength="6">
        </div>
        <button type="submit" class="save-btn" id="updateBtn">Update Password</button>
      </form>
      <p id="settingsMsg" style="margin-top:15px; font-size:0.85rem; text-align:center; min-height: 1.2em;"></p>
    </section>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. Retrieve the data saved during login in app.js
      const storedName = localStorage.getItem("username");
      const storedEmail = localStorage.getItem("userEmail");
      
      // 2. Display with fallbacks to avoid "undefined" or "null"
      const nameEl = document.getElementById("displayFullname");
      const emailEl = document.getElementById("displayEmail");

      nameEl.textContent = (storedName && storedName !== "undefined" && storedName !== "null") ? storedName : "Guest User";
      emailEl.textContent = (storedEmail && storedEmail !== "undefined" && storedEmail !== "null") ? storedEmail : "Not Available";
    });

    // 3. Password Update Logic
    document.getElementById("changePasswordForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const API = "http://localhost:5000";
      const currentPassword = document.getElementById("currPass").value;
      const newPassword = document.getElementById("newPass").value;
      const confirmPassword = document.getElementById("confPass").value;
      const msg = document.getElementById("settingsMsg");
      const btn = document.getElementById("updateBtn");

      // Basic Validation
      if (newPassword !== confirmPassword) {
        msg.style.color = "#fb7185";
        msg.textContent = "New passwords do not match!";
        return;
      }

      // UI State: Loading
      msg.style.color = "#cbd5e1";
      msg.textContent = "Updating password...";
      btn.disabled = true;

      try {
        const email = localStorage.getItem("userEmail");
        const res = await fetch(`${API}/update-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, currentPassword, newPassword })
        });

        const data = await res.json();

        if (data.success) {
          msg.style.color = "#34d399";
          msg.textContent = "Password updated successfully!";
          document.getElementById("changePasswordForm").reset();
        } else {
          msg.style.color = "#fb7185";
          msg.textContent = data.message || "Failed to update password.";
        }
      } catch (error) {
        msg.style.color = "#fb7185";
        msg.textContent = "Server connection failed.";
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
