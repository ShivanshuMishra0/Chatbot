<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyAI Chatbot Sign Up</title> 
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: #e2e8f0; 
  }
  
  .auth-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    
    padding: 40px 30px;
    border-radius: 20px; 
    width: 100%;
    max-width: 380px; /* Made slightly wider to accommodate more fields gracefully */
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
    text-align: center;
    animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; 
  }
  
  .auth-card h2 { 
    margin: 0 0 5px 0; 
    color: #ffffff; 
    letter-spacing: 0.5px;
  }
  
  .subtitle {
    font-size: 0.9rem;
    color: #94a3b8; 
    margin-bottom: 25px;
  }
  
  .auth-card input {
    width: 100%; 
    padding: 12px 15px; 
    margin: 8px 0; /* Slightly tighter margin since there are more inputs */
    
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.15); 
    border-radius: 10px; 
    font-size: 1rem;
    color: #ffffff;
    transition: all 0.3s ease;
  }
  
  .auth-card input::placeholder {
    color: #64748b;
  }
  
  .auth-card input:focus { 
    border-color: #a855f7; 
    background: rgba(0, 0, 0, 0.4);
    outline: none; 
    box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.25); 
  }
  
  .auth-card button {
    width: 100%; 
    padding: 12px; 
    background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    color: white;
    font-size: 1.05rem; 
    font-weight: 600; 
    border: none; 
    border-radius: 10px;
    cursor: pointer; 
    transition: all 0.3s ease; 
    margin-top: 20px;
    box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
  }
  
  .auth-card button:hover { 
    box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
    transform: translateY(-2px);
  }
  
  .auth-card button:active { 
    transform: translateY(1px); 
  } 
  
  #msg { 
    color: #fb7185; 
    margin-top: 15px; 
    font-size: 0.9rem; 
    min-height: 1.2em; 
  }
  
  .helper-links {
    display: flex;
    justify-content: center; /* Centered for the single link */
    margin-top: 20px;
    font-size: 0.9rem;
  }
  
  .helper-links a {
    color: #c084fc; 
    text-decoration: none;
    transition: color 0.3s;
  }
  
  .helper-links a:hover {
    color: #ffffff;
    text-decoration: underline;
  }

  @keyframes pop {
    from { transform: translateY(20px) scale(0.95); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="auth-card">
    <h2>🤖 MyAI Chatbot</h2>
    <p class="subtitle">Join the future of AI</p>
    
    <form id="signupForm">
      <input type="text" id="fullname" placeholder="Full Name" aria-label="Full Name" required />
      <input type="email" id="email" placeholder="Email address" aria-label="Email address" required />
      <input type="password" id="password" placeholder="Create Password" aria-label="Create Password" required minlength="6" />
      <input type="password" id="confirmPassword" placeholder="Confirm Password" aria-label="Confirm Password" required minlength="6" />
      
      <button type="submit" id="signupButton">Create Account</button>
    </form>
    
    <p id="msg"></p>

    <div class="helper-links">
      <a href="BOT.html">Already have an account? Log in</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
